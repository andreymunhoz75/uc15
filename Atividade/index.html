<!DOCTYPE html> 
<html lang="pt-br"> 
<head> 
    <meta charset="UTF-8"> 
    <title>Inscricao em Evento</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
rel="stylesheet"> 
    <link rel="stylesheet" href="style.css"> 
</head> 
<body> 
  
<div class="container py-5"> 
    <div class="row justify-content-center"> 
        <div class="col-md-7"> 
            <div class="card shadow-sm"> 
                <div class="card-body p-4"> 
                    <h1 class="h3 mb-4 text-center">Inscricao no Evento</h1> 
                    <form id="formInscricao" novalidate> 
  
                        <!-- NOME --> 
                        <div class="mb-3"> 
                            <label for="campoNome" class="form-label">Nome completo</label> 
                            <input type="text" id="campoNome" class="form-control"> 
                            <div class="valid-feedback">Nome valido.</div> 
                            <div class="invalid-feedback">Digite ao menos 4 caracteres.</div> 
                        </div> 
  
                        <!-- EMAIL --> 
                        <div class="mb-3"> 
                            <label for="campoEmail" class="form-label">E-mail</label> 
                            <input type="email" id="campoEmail" class="form-control"> 
                            <div class="valid-feedback">E-mail valido.</div> 
                            <div class="invalid-feedback">Digite um e-mail valido (com arroba e ponto).</div> 
                        </div> 
  
                        <!-- CPF --> 
                        <div class="mb-3"> 
                            <label for="campoCpf" class="form-label">CPF (somente numeros)</label> 
                            <input type="text" id="campoCpf" class="form-control" maxlength="11"> 
                            <div class="valid-feedback">CPF valido.</div> 
                            <div class="invalid-feedback">CPF invalido. Verifique os 11 digitos.</div> 
                        </div> 
  
                        <!-- DATA DE NASCIMENTO --> 
                        <div class="mb-3"> 
                            <label for="campoData" class="form-label">Data de nascimento</label> 
                            <input type="date" id="campoData" class="form-control"> 
                            <div class="valid-feedback">Data valida.</div> 
                            <div class="invalid-feedback">Voce precisa ter pelo menos 16 anos.</div> 
                        </div> 
  
                        <!-- TERMOS --> 
                        <div class="mb-4 form-check"> 
                            <input type="checkbox" id="campoTermos" class="form-checkinput"> 
                            <label for="campoTermos" class="form-check-label"> 
                                Aceito os termos do evento 
                            </label> 
                            <div class="invalid-feedback">Voce precisa aceitar os termos.</div> 
                        </div> 
  
                        <!-- BOTAO --> 
                        <div class="d-grid"> 
                            <button type="button" id="btnInscrever" class="btn btn-primary" disabled> 
                                Inscrever 
                            </button> 
                        </div> 
  
                    </form> 
  
                    <div id="msgSucesso" class="alert alert-success mt-4 d-none"> 
                        Inscricao realizada com sucesso! 
                    </div> 
  
                </div> 
            </div> 
        </div> 
    </div> 
</div> 
  
<script src="script.js"></script> 
</body> 
</html>
