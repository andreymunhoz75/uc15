<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <!-- Link do Bootstrap 5 via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Link do style.css após o Bootstrap -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="text-center mb-4">Minhas Tarefas</h1>
                
                <div class="alert alert-info text-center">
                    Total de tarefas: <span id="contador" class="fw-bold">0</span>
                </div>

                <div class="input-group mb-4">
                    <input type="text" id="inputTarefa" class="form-control" placeholder="O que precisa ser feito?">
                    <button id="btnAdicionar" class="btn btn-primary">Adicionar</button>
                </div>

                <ul id="lista" class="list-unstyled"></ul>
            </div>
        </div>
    </div>

    <!-- script.js no final do body -->
    <script src="script.js"></script>
</body>
</html>
