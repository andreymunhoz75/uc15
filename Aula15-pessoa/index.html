<!DOCTYPE html> 
<html lang="pt-br"> 
<head> 
    <meta charset="UTF-8"> 
    <title>Catalogo de Personagens</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
rel="stylesheet"> 
    <link rel="stylesheet" href="style.css"> 
</head> 
<body> 
  
<div class="container py-4"> 
    <h1 class="text-center mb-1">Crimson Desert - Catálogo de Mercenários</h1> 
    <p class="text-center text-muted mb-4 italic">Explore os heróis e mercenários que moldam o destino de Pywel.</p> 

    <!-- FORMULARIO PARA ADICIONAR --> 
    <div class="card mb-4 shadow-sm"> 
        <div class="card-body"> 
            <h2 class="h5 mb-3">Adicionar personagem</h2> 
            <div class="row g-2"> 
                <div class="col-md-3"><input type="text" id="campoNome" class="formcontrol" placeholder="Nome"></div> 
                <div class="col-md-3"><input type="text" id="campoClasse" class="formcontrol" placeholder="Classe"></div> 
                <div class="col-md-2"><input type="number" id="campoLevel" class="formcontrol" placeholder="Level"></div> 
                <div class="col-md-4"><input type="text" id="campoHabilidades" class="formcontrol" placeholder="Habilidades (separadas por virgula)"></div> 
            </div> 
            <div class="row g-2 mt-2"> 
                <div class="col-md-3"><input type="number" id="campoHp" class="formcontrol" placeholder="HP"></div> 
                <div class="col-md-3"><input type="number" id="campoMana" class="formcontrol" placeholder="Mana"></div> 
                <div class="col-md-3"><input type="number" id="campoAtaque" class="formcontrol" placeholder="Ataque"></div> 
                <div class="col-md-3"><button id="btnAdicionarPersonagem" class="btn btnprimary w-100">Adicionar</button></div> 
            </div> 
        </div> 
    </div> 
  
    <!-- AREA DE CATALOGO --> 
    <div id="contadorPersonagens" class="alert alert-dark py-2 mb-3 fw-bold">Total de personagens: 0</div>
    <div id="catalogoPersonagens" class="row g-3"> 
        <!-- cards serao injetados aqui pelo JavaScript --> 
    </div> 
</div> 
  
<script src="script.js"></script> 
</body> 
</html>
