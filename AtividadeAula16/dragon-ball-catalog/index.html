<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Ball Z - Universo de Guerreiros</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container">
            <h1 id="main-title">DRAGON BALL <span>Z</span></h1>
            <p>Catálogo de Guerreiros do Universo 7</p>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Procure por um guerreiro (ex: Goku, Vegeta)...">
            <button id="searchButton">PESQUISAR</button>
        </div>
    </header>

    <main id="characters-grid">
        <!-- Personagens serão carregados aqui -->
        <div class="loader">Carregando Esferas do Dragão...</div>
    </main>

    <footer>
        <p>&copy; 2026 Dragon Ball Intel Hub - Desenvolvido para UC15</p>
    </footer>

    <!-- Modal para Transformações -->
    <div id="characterModal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="closeModal">&times;</span>
            <div id="modal-body">
                <!-- Conteúdo do modal será inserido via JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
