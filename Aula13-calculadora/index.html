<!DOCTYPE html> 
<html lang="pt-br"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Premium</title> 
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head> 
<body> 
    <div class="calculator-container">
        <div class="calculator-card">
            <h2>Calculadora</h2> 
          
            <div class="input-group">
                <input type="number" id="numero1" placeholder="Primeiro numero"> 
                <input type="number" id="numero2" placeholder="Segundo numero"> 
            </div>
          
            <div class="button-grid"> 
                <button id="btnSoma" title="Soma">+</button> 
                <button id="btnSub" title="Subtração">-</button> 
                <button id="btnMult" title="Multiplicação">x</button> 
                <button id="btnDiv" title="Divisão">/</button> 
                <button id="btnPot" title="Potência">^</button>
                <button id="btnRaiz" title="Raiz">√</button>
            </div> 
          
            <div id="display" class="result-display">Resultado: 0</div> 
        </div>
    </div>
    <script src="script.js"></script> 
</body> 
</html>
